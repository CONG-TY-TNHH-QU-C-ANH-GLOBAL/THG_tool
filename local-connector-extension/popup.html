<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>THG Helper</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        width: 320px;
        margin: 0;
        background: #0b1120;
        color: #e5eefc;
      }
      main {
        padding: 14px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 15px;
      }
      p {
        margin: 0 0 12px;
        color: #9fb0c8;
        font-size: 12px;
        line-height: 1.45;
      }
      label {
        display: block;
        color: #b8c7dd;
        font-size: 11px;
        font-weight: 700;
        margin: 10px 0 5px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #334155;
        border-radius: 8px;
        background: #111827;
        color: #e5eefc;
        padding: 9px 10px;
        font-size: 12px;
        outline: none;
      }
      button {
        border: 1px solid #22c55e66;
        border-radius: 8px;
        background: #166534;
        color: #ecfdf5;
        cursor: pointer;
        font-weight: 800;
        padding: 9px 12px;
      }
      button.secondary {
        border-color: #334155;
        background: #111827;
        color: #b8c7dd;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      .row button {
        flex: 1;
      }
      .status {
        border: 1px solid #334155;
        border-radius: 8px;
        background: #111827;
        color: #b8c7dd;
        font-size: 12px;
        line-height: 1.45;
        min-height: 36px;
        padding: 9px;
        word-break: break-word;
      }
      .ok {
        border-color: #22c55e66;
        color: #bbf7d0;
      }
      .error {
        border-color: #ef444466;
        color: #fecaca;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>THG Chrome Helper</h1>
      <p>Use this only when you want THG to read the Facebook tab already signed in on this Chrome profile.</p>

      <label for="serverUrl">THG server</label>
      <input id="serverUrl" value="https://sale.thgfulfill.com">

      <label for="pairingCode">Pairing code from Browser dashboard</label>
      <input id="pairingCode" placeholder="ABCD-1234">

      <div class="row">
        <button id="pairButton">Pair</button>
        <button id="syncButton" class="secondary">Sync now</button>
      </div>
      <div class="row">
        <button id="forgetButton" class="secondary">Forget device</button>
      </div>

      <label>Status</label>
      <div id="status" class="status">Checking...</div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
