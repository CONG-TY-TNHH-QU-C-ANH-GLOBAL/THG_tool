# /etc/nginx/sites-available/thg-scraper
# Domain: sale.thgfulfill.com (behind Cloudflare proxy)
#
# TLS: Cloudflare Origin Certificate (NOT Let's Encrypt)
# SSL mode in Cloudflare dashboard: Full (Strict)
#
# Install:
#   sudo cp nginx.conf /etc/nginx/sites-available/thg-scraper
#   sudo ln -s /etc/nginx/sites-available/thg-scraper /etc/nginx/sites-enabled/thg-scraper
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS redirect
# (Cloudflare also enforces HTTPS, this is defense-in-depth)
server {
    listen 80;
    listen [::]:80;
    server_name sale.thgfulfill.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sale.thgfulfill.com;

    # ── TLS: Cloudflare Origin Certificate ───────────────────────────────
    # Generated from: Cloudflare Dashboard → SSL/TLS → Origin Server → Create Certificate
    # Save the cert to: /etc/ssl/cloudflare/origin.pem
    # Save the key to:  /etc/ssl/cloudflare/origin.key  (chmod 600)
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Only accept traffic from Cloudflare IPs ──────────────────────────
    # This prevents anyone from bypassing Cloudflare and hitting origin directly.
    # Cloudflare IPv4 ranges (update with: https://www.cloudflare.com/ips-v4)
    allow 173.245.48.0/20;
    allow 103.21.244.0/22;
    allow 103.22.200.0/22;
    allow 103.31.4.0/22;
    allow 141.101.64.0/18;
    allow 108.162.192.0/18;
    allow 190.93.240.0/20;
    allow 188.114.96.0/20;
    allow 197.234.240.0/22;
    allow 198.41.128.0/17;
    allow 162.158.0.0/15;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 172.64.0.0/13;
    allow 131.0.72.0/22;
    # Cloudflare IPv6 ranges
    allow 2400:cb00::/32;
    allow 2606:4700::/32;
    allow 2803:f800::/32;
    allow 2405:b500::/32;
    allow 2405:8100::/32;
    allow 2a06:98c0::/29;
    allow 2c0f:f248::/32;
    # Allow localhost for health checks from systemd/monitoring
    allow 127.0.0.1;
    deny all;

    # ── Security Headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    server_tokens off;

    # ── Rate Limiting ────────────────────────────────────────────────────
    # Note: use $http_cf_connecting_ip (real client IP) not $binary_remote_addr
    # (which would be Cloudflare's IP). Requires real_ip setup below.

    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/proxy_params;
    }

    location /api/auth/refresh {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/proxy_params;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/proxy_params;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/proxy_params;
    }

    location ~ /\. {
        deny all;
    }

    # ── Logging ──────────────────────────────────────────────────────────
    access_log /var/log/nginx/thg-scraper.access.log;
    error_log  /var/log/nginx/thg-scraper.error.log;

    client_max_body_size 4m;

    gzip on;
    gzip_types text/plain application/json text/css application/javascript;
    gzip_min_length 1000;
}
