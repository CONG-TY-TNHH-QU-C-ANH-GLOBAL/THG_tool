# /etc/nginx/sites-available/thg-scraper
# Domain: sale.thgfulfill.com (behind Cloudflare proxy)
#
# Architecture:
#   port 3000 — Next.js frontend (thg-frontend.service)
#   port 8080 — cmd/scraper Fiber server (thg-scraper.service) — legacy API + Telegram
#   port 8081 — cmd/api stdlib server  (thg-api.service)       — React API + VNC proxy
#
# TLS: Cloudflare Origin Certificate (NOT Let's Encrypt)
# SSL mode in Cloudflare dashboard: Full (Strict)

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name sale.thgfulfill.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# Shared upstream definitions
upstream frontend  {
    server 127.0.0.1:3000 fail_timeout=5s max_fails=2;
    server 127.0.0.1:8080 backup;  # fallback to legacy Fiber if Next.js is down
}
upstream scraper   { server 127.0.0.1:8080; }
upstream api       { server 127.0.0.1:8081; }

# HTTPS — main server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sale.thgfulfill.com;

    # ── TLS: Cloudflare Origin Certificate ───────────────────────────────
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Security Headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # SAMEORIGIN (not DENY) — allows the VNC viewer iframe embedded within the same domain.
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
    # cdn.jsdelivr.net: noVNC ES module. wss: VNC WebSocket. cloudflareinsights: analytics beacon.
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss://sale.thgfulfill.com https://cloudflareinsights.com; frame-src 'self';" always;

    server_tokens off;

    # ── WebSocket: VNC proxy → cmd/api (port 8081) ───────────────────────
    # Must be before the generic /ws/ block.
    location /ws/vnc/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── WebSocket: agent hub + legacy WS → cmd/scraper (port 8080) ───────
    location /ws/ {
        proxy_pass http://scraper;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── VNC viewer HTML page → cmd/api (port 8081) ───────────────────────
    location /vnc-viewer/ {
        proxy_pass http://api;
        include /etc/nginx/proxy_params;
    }

    # ── New REST API (React frontend) → cmd/api (port 8081) ──────────────
    location /api/v1/ {
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://api;
        include /etc/nginx/proxy_params;
    }

    # ── Legacy auth rate-limiting → cmd/scraper (port 8080) ─────────────
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://scraper;
        include /etc/nginx/proxy_params;
    }

    location /api/auth/refresh {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://scraper;
        include /etc/nginx/proxy_params;
    }

    # ── Legacy API → cmd/scraper (port 8080) ─────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://scraper;
        include /etc/nginx/proxy_params;
    }

    # ── Next.js frontend (port 3000) — all other traffic ─────────────────
    location /_next/static/ {
        proxy_pass http://frontend;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        include /etc/nginx/proxy_params;
    }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        include /etc/nginx/proxy_params;
    }

    location ~ /\. {
        deny all;
    }

    # ── Logging ──────────────────────────────────────────────────────────
    access_log /var/log/nginx/thg-scraper.access.log;
    error_log  /var/log/nginx/thg-scraper.error.log;

    client_max_body_size 4m;

    gzip on;
    gzip_types text/plain application/json text/css application/javascript application/x-javascript text/xml;
    gzip_min_length 1000;
}
