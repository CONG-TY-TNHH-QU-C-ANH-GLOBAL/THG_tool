# /etc/nginx/sites-available/thg-scraper
# Domain: sale.thgfulfill.com (behind Cloudflare proxy)
#
# Architecture:
#   /api/*  → thg-api  (Go, :8080)
#   /ws/*   → thg-api  (Go, :8080) — SSE + WebSocket
#   /       → thg-frontend (Next.js, :3000)
#
# TLS: Cloudflare Origin Certificate
# Install:
#   sudo cp nginx.conf /etc/nginx/sites-available/thg-scraper
#   sudo ln -sf /etc/nginx/sites-available/thg-scraper /etc/nginx/sites-enabled/thg-scraper
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name sale.thgfulfill.com;
    return 301 https://$host$request_uri;
}

# Upstream definitions
upstream thg_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream thg_frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

# HTTPS — main server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sale.thgfulfill.com;

    # ── TLS: Cloudflare Origin Certificate ───────────────────────────────
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Only accept traffic from Cloudflare IPs ──────────────────────────
    allow 173.245.48.0/20;
    allow 103.21.244.0/22;
    allow 103.22.200.0/22;
    allow 103.31.4.0/22;
    allow 141.101.64.0/18;
    allow 108.162.192.0/18;
    allow 190.93.240.0/20;
    allow 188.114.96.0/20;
    allow 197.234.240.0/22;
    allow 198.41.128.0/17;
    allow 162.158.0.0/15;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 172.64.0.0/13;
    allow 131.0.72.0/22;
    allow 2400:cb00::/32;
    allow 2606:4700::/32;
    allow 2803:f800::/32;
    allow 2405:b500::/32;
    allow 2405:8100::/32;
    allow 2a06:98c0::/29;
    allow 2c0f:f248::/32;
    allow 127.0.0.1;
    deny all;

    # ── Security Headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss://sale.thgfulfill.com;" always;

    server_tokens off;

    # ── Rate limit zones (defined in nginx.conf http block) ──────────────
    # Add to /etc/nginx/nginx.conf inside http { }:
    #   limit_req_zone $http_cf_connecting_ip zone=login:10m rate=3r/m;
    #   limit_req_zone $http_cf_connecting_ip zone=api:10m   rate=60r/m;

    # ── SSE stream — long-lived, no buffering ────────────────────────────
    location /api/v1/events/stream {
        proxy_pass         http://thg_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # ── Auth endpoints — strict rate limit ───────────────────────────────
    location /api/v1/auth/ {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass         http://thg_api;
        include            /etc/nginx/proxy_params;
    }

    # ── All API routes → Go backend ──────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;
        proxy_pass         http://thg_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        include            /etc/nginx/proxy_params;
    }

    # ── Next.js static assets (long cache) ───────────────────────────────
    location /_next/static/ {
        proxy_pass         http://thg_frontend;
        proxy_cache_valid  200 365d;
        add_header         Cache-Control "public, max-age=31536000, immutable";
        include            /etc/nginx/proxy_params;
    }

    # ── All other traffic → Next.js frontend ─────────────────────────────
    location / {
        proxy_pass         http://thg_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        include            /etc/nginx/proxy_params;
    }

    location ~ /\. {
        deny all;
    }

    # ── Logging ──────────────────────────────────────────────────────────
    access_log /var/log/nginx/thg-scraper.access.log;
    error_log  /var/log/nginx/thg-scraper.error.log;

    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain application/json text/css application/javascript application/x-javascript text/xml application/xml;
    gzip_min_length 1000;
    gzip_proxied any;
}
