name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Download dependencies
        run: go mod download

      # ── OpenSpec: architecture validation ────────────────────────────────────
      - name: Validate architecture (no forbidden imports)
        run: |
          if grep -r '"github.com/thg/scraper/internal/skills"' --include="*.go" .; then
            echo "ERROR: internal/skills import detected — must be fully removed"
            exit 1
          fi
          if grep -r 'SkillRouter\|SkillExecutor\|skill_run' --include="*.go" .; then
            echo "ERROR: skill-based symbols still present"
            exit 1
          fi
          echo "Architecture validation: PASS"

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: go vet
        run: go vet ./...

      - name: Build cmd/api
        run: go build ./cmd/api/

      - name: Build cmd/worker
        run: go build ./cmd/worker/

      # ── Test ──────────────────────────────────────────────────────────────────
      - name: Run tests (with race detector)
        run: go test -race -timeout 120s ./...

      # ── Autonomous loop feedback ──────────────────────────────────────────────
      # On failure, the engine.LoopController generates a structured FixRequest.
      # In production this would trigger Superpowers patch cycle (max 3 retries).
      - name: Generate fix request on failure
        if: failure()
        run: |
          echo '{"failure_type":"ci","message":"Build or test failed — see above logs","instructions":"Fix all errors. Do NOT break idempotency logic or public interfaces. Max 3 retry attempts allowed."}' > fix_request.json
          cat fix_request.json

      - name: Upload fix request
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fix-request
          path: fix_request.json
          retention-days: 3
