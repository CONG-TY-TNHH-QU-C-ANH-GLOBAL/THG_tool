name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: File-size guardrail (200-line rule, baseline-aware)
        run: python3 scripts/check_file_size.py

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Runtime topology contract (specs/RUNTIME_TOPOLOGY.md §6)
        run: bash scripts/check_topology.sh

      # Architecture import-boundary guard — WARN-ONLY (Phase A). Prints module
      # boundary warnings + the roadmap phase that fixes each; it must NEVER fail
      # the pipeline. Promotion to fail-hard is a later phase (docs/architecture/
      # REFACTOR_ROADMAP.md). `|| true` is belt-and-suspenders; the script already
      # exits 0 by design.
      - name: Architecture import boundaries (warn-only)
        run: bash scripts/check_import_boundaries.sh || true

      - name: go vet
        run: go vet ./...

      - name: Build production Go binaries
        run: go build ./cmd/scraper/ ./cmd/worker/

      - name: Run tests (with race detector)
        run: go test -race -timeout 120s ./...

      - name: Generate fix request on failure
        if: failure()
        run: |
          echo '{"failure_type":"ci","message":"Build or test failed","instructions":"Fix all errors. Max 3 retry attempts."}' > fix_request.json

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: fix-request
          path: fix_request.json
          retention-days: 3
