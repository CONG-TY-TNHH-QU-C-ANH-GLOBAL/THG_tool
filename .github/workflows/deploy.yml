name: Deploy to Server

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: false
        default: 'amd64'
        type: choice
        options: [ amd64, arm64 ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    timeout-minutes: 25

    env:
      TARGET_ARCH: ${{ github.event.inputs.arch || vars.SERVER_ARCH || 'amd64' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # ── Go builds ─────────────────────────────────────────────────────────

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Run Go tests
      run: go test ./... -timeout 60s || true

    - name: Build Go binaries (scraper + api)
      env:
        GOOS: linux
        CGO_ENABLED: '0'
      run: |
        echo "Building for linux/$TARGET_ARCH"
        GOARCH=$TARGET_ARCH go build -ldflags="-s -w -X main.version=${{ github.sha }}" -o scraper  ./cmd/scraper
        GOARCH=$TARGET_ARCH go build -ldflags="-s -w -X main.version=${{ github.sha }}" -o thg-api  ./cmd/api
        GOARCH=$TARGET_ARCH go build -ldflags="-s -w -X main.version=${{ github.sha }}" -o thg-worker ./cmd/worker

        # Verify architecture
        for bin in scraper thg-api thg-worker; do
          INFO=$(file $bin)
          echo "$bin: $INFO"
          if [ "$TARGET_ARCH" = "arm64" ]; then
            echo "$INFO" | grep -q "ARM aarch64" || { echo "❌ Expected ARM64 for $bin"; exit 1; }
          else
            echo "$INFO" | grep -q "x86-64" || { echo "❌ Expected AMD64 for $bin"; exit 1; }
          fi
        done
        ls -lh scraper thg-api thg-worker
        echo "✅ Go binaries built"

    # ── React/Next.js frontend build ──────────────────────────────────────

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Build Next.js frontend (standalone)
      working-directory: frontend
      env:
        NODE_ENV: production
        # NEXT_PUBLIC vars are baked into the bundle at build time
        NEXT_PUBLIC_SITE_URL: https://sale.thgfulfill.com
      run: |
        npm run build
        # Copy static assets into standalone dir (required for Next.js standalone)
        cp -r .next/static .next/standalone/.next/static
        # Copy public/ dir if it exists
        if [ -d public ]; then
          cp -r public .next/standalone/public
        fi
        echo "✅ Frontend built"

    - name: Package frontend standalone
      working-directory: frontend
      run: |
        tar -czf ../frontend-standalone.tar.gz -C .next/standalone .
        ls -lh ../frontend-standalone.tar.gz
        echo "✅ Frontend packaged"

    # ── Deploy binaries ───────────────────────────────────────────────────

    - name: Deploy Go binaries
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        source: "scraper,thg-api,thg-worker"
        target: "/tmp/"
        overwrite: true

    - name: Deploy frontend bundle + config files
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        source: "frontend-standalone.tar.gz,docker/,deploy/"
        target: "/tmp/thg-deploy/"
        overwrite: true

    # ── Install and restart services ──────────────────────────────────────

    - name: Install and restart
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -euo pipefail

          # ── Rollback snapshot ───────────────────────────────────────────
          for bin in scraper thg-api thg-worker; do
            if [ -f /opt/thg-scraper/$bin ]; then
              sudo cp /opt/thg-scraper/$bin /opt/thg-scraper/${bin}.prev
            fi
          done

          # ── Install Go binaries ────────────────────────────────────────
          for bin in scraper thg-api thg-worker; do
            sudo mv /tmp/$bin /opt/thg-scraper/$bin
            sudo chown root:thg-scraper /opt/thg-scraper/$bin
            sudo chmod 750 /opt/thg-scraper/$bin
          done
          echo "✅ Go binaries installed"

          # ── Install Node.js if missing ────────────────────────────────
          if ! command -v node &>/dev/null; then
            echo "📦 Installing Node.js 20..."
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
            # NodeSource should put node at /usr/bin/node; create symlink if needed
            if ! [ -x /usr/bin/node ] && [ -x /usr/local/bin/node ]; then
              sudo ln -sf /usr/local/bin/node /usr/bin/node
            fi
            echo "✅ Node.js $(node --version) at $(which node)"
          else
            echo "ℹ️  Node.js $(node --version) already installed at $(which node)"
          fi

          # ── Deploy Next.js standalone ─────────────────────────────────
          # Wipe old standalone first to prevent stale files
          sudo rm -rf /opt/thg-scraper/frontend-standalone
          sudo mkdir -p /opt/thg-scraper/frontend-standalone
          sudo tar -xzf /tmp/thg-deploy/frontend-standalone.tar.gz \
            -C /opt/thg-scraper/frontend-standalone
          # Create cache dir — systemd ReadWritePaths (if any) requires it to pre-exist
          sudo mkdir -p /opt/thg-scraper/frontend-standalone/.next/cache
          sudo chown -R thg-scraper:thg-scraper /opt/thg-scraper/frontend-standalone
          echo "✅ Frontend deployed"

          # ── Build Docker browser image (if changed) ────────────────────
          if ! docker image inspect thg-browser:latest > /dev/null 2>&1 || \
             [ "/tmp/thg-deploy/docker/Dockerfile" -nt "/opt/thg-scraper/docker/Dockerfile" ] 2>/dev/null; then
            echo "🐳 Building thg-browser Docker image..."
            sudo mkdir -p /opt/thg-scraper/docker
            sudo cp -r /tmp/thg-deploy/docker/. /opt/thg-scraper/docker/
            sudo chmod +x /opt/thg-scraper/docker/entrypoint.sh
            docker build -t thg-browser:latest /opt/thg-scraper/docker/
            echo "✅ Docker image built"
          else
            echo "ℹ️  Docker image up-to-date, skipping build"
          fi

          usermod -aG docker thg-scraper 2>/dev/null || true

          # ── Install systemd service files ─────────────────────────────
          for svc in thg-scraper thg-api thg-worker thg-frontend; do
            if [ -f /tmp/thg-deploy/deploy/${svc}.service ]; then
              sudo cp /tmp/thg-deploy/deploy/${svc}.service /etc/systemd/system/${svc}.service
            fi
          done
          sudo systemctl daemon-reload

          # ── Deploy nginx config ───────────────────────────────────────
          # Deploy http-block config first (defines rate limit zones used by sites-available)
          sudo cp /tmp/thg-deploy/deploy/nginx-http-block.conf /etc/nginx/conf.d/cloudflare.conf
          sudo cp /tmp/thg-deploy/deploy/nginx.conf /etc/nginx/sites-available/thg-scraper
          sudo ln -sf /etc/nginx/sites-available/thg-scraper /etc/nginx/sites-enabled/thg-scraper
          if sudo nginx -t 2>&1; then
            echo "✅ nginx config valid"
          else
            echo "❌ nginx config INVALID — aborting before reload"
            sudo nginx -t 2>&1 || true
            exit 1
          fi

          rm -rf /tmp/thg-deploy /tmp/frontend-standalone.tar.gz

          # ── Restart services ──────────────────────────────────────────
          sudo systemctl enable thg-api thg-frontend thg-worker 2>/dev/null || true
          sudo systemctl restart thg-scraper thg-api thg-worker
          sleep 5
          sudo systemctl restart thg-frontend
          sleep 5
          if sudo systemctl reload nginx; then
            echo "✅ nginx reloaded"
          else
            echo "❌ nginx reload FAILED — check config"
            sudo systemctl status nginx --no-pager -n 20 || true
            exit 1
          fi

          # ── Verify site reachable from localhost (catch deny-all / upstream issues) ──
          echo "⏳ Testing site reachability via localhost..."
          for i in $(seq 1 5); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 2>/dev/null || echo "000")
            echo "  Next.js direct (port 3000): HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "308" ] || [ "$HTTP_CODE" = "307" ]; then
              echo "✅ Next.js reachable on port 3000"
              break
            fi
            sleep 3
          done

          # ── Health checks ─────────────────────────────────────────────
          # Go services (scraper + api) are REQUIRED — failure triggers rollback.
          # Next.js frontend is checked but only logs a warning on failure.
          echo "⏳ Waiting for Go services to be healthy..."
          PASS=0

          for i in $(seq 1 10); do
            sleep 2
            if curl -sf http://localhost:8080/api/stats > /dev/null 2>&1; then
              echo "✅ cmd/scraper healthy (attempt $i)"
              PASS=$((PASS+1))
              break
            fi
            echo "  scraper: waiting ($i/10)..."
          done

          for i in $(seq 1 10); do
            sleep 2
            if curl -sf http://localhost:8081/health > /dev/null 2>&1; then
              echo "✅ cmd/api healthy (attempt $i)"
              PASS=$((PASS+1))
              break
            fi
            echo "  api: waiting ($i/10)..."
          done

          # Rollback if either Go service is down (critical path)
          if [ "$PASS" -lt 2 ]; then
            echo "❌ Go services unhealthy ($PASS/2) — rolling back!"
            for bin in scraper thg-api thg-worker; do
              if [ -f /opt/thg-scraper/${bin}.prev ]; then
                sudo mv /opt/thg-scraper/${bin}.prev /opt/thg-scraper/$bin
                sudo chown root:thg-scraper /opt/thg-scraper/$bin
                sudo chmod 750 /opt/thg-scraper/$bin
              fi
            done
            sudo systemctl restart thg-scraper thg-api thg-worker
            sudo journalctl -u thg-api --no-pager -n 30
            exit 1
          fi

          # Frontend health check — non-fatal, just report status
          FRONTEND_OK=0
          for i in $(seq 1 15); do
            sleep 3
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Next.js frontend healthy (attempt $i)"
              FRONTEND_OK=1
              break
            fi
            echo "  frontend: waiting ($i/15)..."
          done

          if [ "$FRONTEND_OK" -eq 0 ]; then
            echo "⚠️  Frontend not responding — check logs below (Go API is still live)"
            sudo journalctl -u thg-frontend --no-pager -n 40
            echo "--- nginx error log (last 20 lines) ---"
            sudo tail -n 20 /var/log/nginx/thg-scraper.error.log 2>/dev/null || true
            echo "--- nginx access log (last 5 lines) ---"
            sudo tail -n 5 /var/log/nginx/thg-scraper.access.log 2>/dev/null || true
            echo "--- upstream port status ---"
            sudo ss -tlnp | grep -E ':3000|:8080|:8081' || true
            # Don't exit 1 — Go API is healthy, deployment succeeded for backend
          fi

          echo "🚀 Deployment complete! (scraper ✅ api ✅ frontend $([ $FRONTEND_OK -eq 1 ] && echo ✅ || echo ⚠️))"
