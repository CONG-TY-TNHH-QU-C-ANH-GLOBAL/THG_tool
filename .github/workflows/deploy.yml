name: Deploy to Server

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      arch:
        description: "Target architecture"
        required: false
        default: "amd64"
        type: choice
        options: [amd64, arm64]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    timeout-minutes: 25

    env:
      TARGET_ARCH: ${{ github.event.inputs.arch || vars.SERVER_ARCH || 'amd64' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./... -timeout 60s

      - name: Build Go binaries (scraper + worker)
        env:
          GOOS: linux
          CGO_ENABLED: "0"
        run: |
          echo "Building for linux/$TARGET_ARCH"
          GOARCH=$TARGET_ARCH go build -ldflags="-s -w -X main.version=${{ github.sha }}" -o scraper ./cmd/scraper
          GOARCH=$TARGET_ARCH go build -ldflags="-s -w -X main.version=${{ github.sha }}" -o thg-worker ./cmd/worker

          for bin in scraper thg-worker; do
            INFO=$(file "$bin")
            echo "$bin: $INFO"
            if [ "$TARGET_ARCH" = "arm64" ]; then
              echo "$INFO" | grep -q "ARM aarch64" || { echo "Expected ARM64 for $bin"; exit 1; }
            else
              echo "$INFO" | grep -q "x86-64" || { echo "Expected AMD64 for $bin"; exit 1; }
            fi
          done

          ls -lh scraper thg-worker
          echo "Go binaries built"

      - name: Build THG Local Connector downloads
        env:
          OUT_DIR: thg-login-downloads
        run: |
          bash scripts/build-local-connector.sh "${{ github.sha }}"
          ls -lh thg-login-downloads
          file thg-login-downloads/*

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js frontend (standalone)
        working-directory: frontend
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SITE_URL: https://sale.thgfulfill.com
        run: |
          npm run build
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then
            cp -r public .next/standalone/public
          fi
          echo "Frontend built"

      - name: Package frontend standalone
        working-directory: frontend
        run: |
          tar -czf ../frontend-standalone.tar.gz -C .next/standalone .
          ls -lh ../frontend-standalone.tar.gz
          echo "Frontend packaged"

      - name: Deploy Go binaries
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "scraper,thg-worker"
          target: "/tmp/"
          overwrite: true

      - name: Deploy frontend bundle + config files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "frontend-standalone.tar.gz,docker/,deploy/,thg-login-downloads/"
          target: "/tmp/thg-deploy/"
          overwrite: true

      - name: Install and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -euo pipefail

            # Retire old split API service. cmd/api was removed; cmd/scraper
            # now owns the Fiber API on port 8080.
            sudo systemctl disable --now thg-api 2>/dev/null || true
            sudo rm -f /etc/systemd/system/thg-api.service

            # Rollback snapshot for deployed Go binaries.
            for bin in scraper thg-worker; do
              if [ -f /opt/thg-scraper/$bin ]; then
                sudo cp /opt/thg-scraper/$bin /opt/thg-scraper/${bin}.prev
              fi
            done

            # Install Go binaries.
            for bin in scraper thg-worker; do
              sudo mv /tmp/$bin /opt/thg-scraper/$bin
              sudo chown root:thg-scraper /opt/thg-scraper/$bin
              sudo chmod 750 /opt/thg-scraper/$bin
            done
            echo "Go binaries installed"

            # Install downloadable THG Local Connector builds served by /downloads.
            sudo mkdir -p /opt/thg-scraper/data/downloads
            sudo cp /tmp/thg-deploy/thg-login-downloads/thg-login-* /opt/thg-scraper/data/downloads/
            sudo chown -R thg-scraper:thg-scraper /opt/thg-scraper/data/downloads
            sudo chmod 750 /opt/thg-scraper/data/downloads
            sudo chmod 640 /opt/thg-scraper/data/downloads/thg-login-*
            echo "Local Connector downloads installed"

            # Install Node.js if missing.
            if ! command -v node &>/dev/null; then
              echo "Installing Node.js 20..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
              if ! [ -x /usr/bin/node ] && [ -x /usr/local/bin/node ]; then
                sudo ln -sf /usr/local/bin/node /usr/bin/node
              fi
              echo "Node.js $(node --version) at $(which node)"
            else
              echo "Node.js $(node --version) already installed at $(which node)"
            fi

            # Deploy Next.js standalone bundle.
            sudo rm -rf /opt/thg-scraper/frontend-standalone
            sudo mkdir -p /opt/thg-scraper/frontend-standalone
            sudo tar -xzf /tmp/thg-deploy/frontend-standalone.tar.gz \
              -C /opt/thg-scraper/frontend-standalone
            sudo mkdir -p /opt/thg-scraper/frontend-standalone/.next/cache
            sudo chown -R thg-scraper:thg-scraper /opt/thg-scraper/frontend-standalone
            echo "Frontend deployed"

            # Build Docker browser image if missing or changed. Compare both
            # Dockerfile and entrypoint because CDP flags live in entrypoint.sh.
            sudo mkdir -p /opt/thg-scraper/docker
            REBUILD_BROWSER=false
            if ! docker image inspect thg-browser:latest > /dev/null 2>&1; then
              REBUILD_BROWSER=true
            elif ! cmp -s /tmp/thg-deploy/docker/Dockerfile /opt/thg-scraper/docker/Dockerfile 2>/dev/null; then
              REBUILD_BROWSER=true
            elif ! cmp -s /tmp/thg-deploy/docker/entrypoint.sh /opt/thg-scraper/docker/entrypoint.sh 2>/dev/null; then
              REBUILD_BROWSER=true
            fi

            sudo cp -r /tmp/thg-deploy/docker/. /opt/thg-scraper/docker/
            sudo chmod +x /opt/thg-scraper/docker/entrypoint.sh
            if [ "$REBUILD_BROWSER" = "true" ]; then
              echo "Building thg-browser Docker image..."
              docker build -t thg-browser:latest /opt/thg-scraper/docker/
              echo "Docker image built"
            else
              echo "Docker image up-to-date, skipping build"
            fi

            usermod -aG docker thg-scraper 2>/dev/null || true

            # Install systemd service files.
            for svc in thg-scraper thg-worker thg-frontend; do
              if [ -f /tmp/thg-deploy/deploy/${svc}.service ]; then
                sudo cp /tmp/thg-deploy/deploy/${svc}.service /etc/systemd/system/${svc}.service
              fi
            done
            sudo systemctl daemon-reload

            # Deploy nginx config.
            sudo cp /tmp/thg-deploy/deploy/nginx-http-block.conf /etc/nginx/conf.d/cloudflare.conf
            sudo cp /tmp/thg-deploy/deploy/nginx.conf /etc/nginx/sites-available/thg-scraper
            sudo ln -sf /etc/nginx/sites-available/thg-scraper /etc/nginx/sites-enabled/thg-scraper
            if sudo nginx -t 2>&1; then
              echo "nginx config valid"
            else
              echo "nginx config invalid; aborting before reload"
              sudo nginx -t 2>&1 || true
              exit 1
            fi

            rm -rf /tmp/thg-deploy /tmp/frontend-standalone.tar.gz

            # Restart services.
            sudo systemctl enable thg-scraper thg-frontend thg-worker 2>/dev/null || true
            sudo systemctl restart thg-scraper thg-worker
            sleep 5
            sudo systemctl restart thg-frontend
            sleep 5
            if sudo systemctl reload nginx; then
              echo "nginx reloaded"
            else
              echo "nginx reload failed"
              sudo systemctl status nginx --no-pager -n 20 || true
              exit 1
            fi

            # Verify Next.js direct reachability.
            echo "Testing site reachability via localhost..."
            for i in $(seq 1 5); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 2>/dev/null || echo "000")
              echo "  Next.js direct (port 3000): HTTP $HTTP_CODE"
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "308" ] || [ "$HTTP_CODE" = "307" ]; then
                echo "Next.js reachable on port 3000"
                break
              fi
              sleep 3
            done

            # Go API is required; frontend warning is non-fatal.
            echo "Waiting for Go API service to be healthy..."
            PASS=0
            for i in $(seq 1 10); do
              sleep 2
              if curl -sf http://localhost:8080/api/stats > /dev/null 2>&1; then
                echo "cmd/scraper healthy (attempt $i)"
                PASS=1
                break
              fi
              echo "  scraper: waiting ($i/10)..."
            done

            if [ "$PASS" -lt 1 ]; then
              echo "Go API service unhealthy; rolling back!"
              for bin in scraper thg-worker; do
                if [ -f /opt/thg-scraper/${bin}.prev ]; then
                  sudo mv /opt/thg-scraper/${bin}.prev /opt/thg-scraper/$bin
                  sudo chown root:thg-scraper /opt/thg-scraper/$bin
                  sudo chmod 750 /opt/thg-scraper/$bin
                fi
              done
              sudo systemctl restart thg-scraper thg-worker
              sudo journalctl -u thg-scraper --no-pager -n 50
              exit 1
            fi

            FRONTEND_OK=0
            for i in $(seq 1 15); do
              sleep 3
              if curl -sf http://localhost:3000 > /dev/null 2>&1; then
                echo "Next.js frontend healthy (attempt $i)"
                FRONTEND_OK=1
                break
              fi
              echo "  frontend: waiting ($i/15)..."
            done

            if [ "$FRONTEND_OK" -eq 0 ]; then
              echo "Frontend not responding; Go API is still live"
              sudo journalctl -u thg-frontend --no-pager -n 40
              echo "--- nginx error log (last 20 lines) ---"
              sudo tail -n 20 /var/log/nginx/thg-scraper.error.log 2>/dev/null || true
              echo "--- nginx access log (last 5 lines) ---"
              sudo tail -n 5 /var/log/nginx/thg-scraper.access.log 2>/dev/null || true
              echo "--- upstream port status ---"
              sudo ss -tlnp | grep -E ':3000|:8080' || true
            fi

            echo "Deployment complete: scraper ok, worker restarted, frontend $([ $FRONTEND_OK -eq 1 ] && echo ok || echo warning)"
