name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: false
        default: 'amd64'
        type: choice
        options: [ amd64, arm64 ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # SERVER_ARCH secret overrides the default (set to "arm64" for Hetzner CAX, "amd64" for Azure/DO/Contabo)
    env:
      TARGET_ARCH: ${{ github.event.inputs.arch || vars.SERVER_ARCH || 'amd64' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Run tests
      run: go test ./... -timeout 60s || true

    - name: Build binary
      env:
        GOOS: linux
        CGO_ENABLED: '0'
      run: |
        echo "Building for linux/$TARGET_ARCH"
        GOARCH=$TARGET_ARCH go build -ldflags="-s -w -X main.version=${{ github.sha }}" -o scraper ./cmd/scraper

        # Verify architecture matches what we expect
        ARCH_INFO=$(file scraper)
        echo "Binary info: $ARCH_INFO"

        if [ "$TARGET_ARCH" = "arm64" ]; then
          echo "$ARCH_INFO" | grep -q "ARM aarch64" || { echo "❌ Expected ARM64 binary!"; exit 1; }
        else
          echo "$ARCH_INFO" | grep -q "x86-64" || { echo "❌ Expected AMD64 binary!"; exit 1; }
        fi

        ls -lh scraper
        echo "✅ Binary verified: linux/$TARGET_ARCH"

    # Deploy binary + docker build files
    - name: Deploy binary to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        source: "scraper"
        target: "/tmp/"
        overwrite: true

    - name: Deploy docker build files and service definition
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        source: "docker/,deploy/thg-scraper.service"
        target: "/tmp/thg-deploy/"
        overwrite: true

    - name: Install and restart
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -euo pipefail

          # Keep previous binary for instant rollback
          if [ -f /opt/thg-scraper/scraper ]; then
            sudo cp /opt/thg-scraper/scraper /opt/thg-scraper/scraper.prev
          fi

          # Install new binary
          sudo mv /tmp/scraper /opt/thg-scraper/scraper
          sudo chown root:thg-scraper /opt/thg-scraper/scraper
          sudo chmod 750 /opt/thg-scraper/scraper

          # Update systemd service file (picks up Docker socket permissions)
          sudo cp /tmp/thg-deploy/deploy/thg-scraper.service /etc/systemd/system/thg-scraper.service
          sudo systemctl daemon-reload

          # Build Docker browser image if Dockerfile changed or image missing
          if ! docker image inspect thg-browser:latest > /dev/null 2>&1 || \
             [ "/tmp/thg-deploy/docker/Dockerfile" -nt "/opt/thg-scraper/docker/Dockerfile" ] 2>/dev/null; then
            echo "🐳 Building thg-browser Docker image..."
            sudo mkdir -p /opt/thg-scraper/docker
            sudo cp -r /tmp/thg-deploy/docker/. /opt/thg-scraper/docker/
            sudo chmod +x /opt/thg-scraper/docker/entrypoint.sh
            docker build -t thg-browser:latest /opt/thg-scraper/docker/
            echo "✅ Docker image built"
          else
            echo "ℹ️  Docker image up-to-date, skipping build"
          fi
          rm -rf /tmp/thg-deploy

          # Ensure thg-scraper user can run Docker
          usermod -aG docker thg-scraper 2>/dev/null || true

          # Restart service
          sudo systemctl restart thg-scraper

          # Wait up to 30s for health check
          for i in $(seq 1 10); do
            sleep 3
            if curl -sf http://localhost:8080/api/stats > /dev/null; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "⏳ Waiting... ($i/10)"
          done

          # Failed — rollback automatically
          echo "❌ Health check failed — rolling back!"
          if [ -f /opt/thg-scraper/scraper.prev ]; then
            sudo mv /opt/thg-scraper/scraper.prev /opt/thg-scraper/scraper
            sudo chown root:thg-scraper /opt/thg-scraper/scraper
            sudo chmod 750 /opt/thg-scraper/scraper
            sudo systemctl restart thg-scraper
            echo "⚠️ Rolled back to previous version"
          fi
          sudo journalctl -u thg-scraper --no-pager -n 30
          exit 1
