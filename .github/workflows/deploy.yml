name: CI / Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: false
        default: 'amd64'
        type: choice
        options: [amd64, arm64]

jobs:
  # ── Job 1: CI — build + test Go + typecheck Next.js ─────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Go — download dependencies
        run: go mod download

      - name: Go — vet
        run: go vet ./...

      - name: Go — build cmd/api
        run: go build ./cmd/api/

      - name: Go — build cmd/worker
        run: go build ./cmd/worker/

      - name: Go — tests (race detector)
        run: go test -race -timeout 120s ./...

      - name: Frontend — install dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend — typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Frontend — lint
        working-directory: frontend
        run: npm run lint || true

      - name: Upload fix request on failure
        if: failure()
        run: |
          echo '{"failure_type":"ci","message":"Build or test failed","instructions":"Fix all errors. Max 3 retry attempts."}' > fix_request.json
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: fix-request
          path: fix_request.json
          retention-days: 3

  # ── Job 2: Deploy — chỉ chạy sau CI pass, chỉ trên main ────────────────────
  deploy:
    name: Deploy to Server
    needs: [ci]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TARGET_ARCH: ${{ github.event.inputs.arch || vars.SERVER_ARCH || 'amd64' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Build Go binaries ─────────────────────────────────────────────────
      - name: Build thg-api
        env:
          GOOS: linux
          CGO_ENABLED: '0'
        run: |
          GOARCH=$TARGET_ARCH go build \
            -ldflags="-s -w -X main.version=${{ github.sha }}" \
            -o thg-api ./cmd/api/
          echo "✅ thg-api: $(file thg-api)"

      - name: Build thg-worker
        env:
          GOOS: linux
          CGO_ENABLED: '0'
        run: |
          GOARCH=$TARGET_ARCH go build \
            -ldflags="-s -w -X main.version=${{ github.sha }}" \
            -o thg-worker ./cmd/worker/
          echo "✅ thg-worker: $(file thg-worker)"

      # ── Build Next.js frontend ────────────────────────────────────────────
      - name: Frontend — install & build
        working-directory: frontend
        env:
          # Point server-side API calls to local API during build
          API_URL: http://127.0.0.1:8080
          NEXT_TELEMETRY_DISABLED: '1'
        run: |
          npm ci
          npm run build
          echo "✅ Next.js build complete"

      # ── Upload artifacts to server ────────────────────────────────────────
      - name: Deploy Go binaries
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "thg-api,thg-worker"
          target: "/tmp/thg-deploy/"
          overwrite: true

      - name: Deploy Next.js build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "frontend/.next,frontend/public,frontend/package.json,frontend/package-lock.json,frontend/next.config.mjs"
          target: "/tmp/thg-deploy/"
          overwrite: true

      - name: Deploy service + nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "deploy/"
          target: "/tmp/thg-deploy/"
          overwrite: true

      # ── Install, migrate services, restart ───────────────────────────────
      - name: Install and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -euo pipefail
            DEPLOY=/tmp/thg-deploy
            INSTALL=/opt/thg-scraper

            # ── Ensure directories exist ──────────────────────────────────
            sudo mkdir -p $INSTALL/data $INSTALL/frontend

            # ── Install Go binaries (keep prev for rollback) ──────────────
            for bin in thg-api thg-worker; do
              if [ -f $INSTALL/$bin ]; then
                sudo cp $INSTALL/$bin $INSTALL/${bin}.prev
              fi
              sudo mv $DEPLOY/$bin $INSTALL/$bin
              sudo chown root:thg-scraper $INSTALL/$bin
              sudo chmod 750 $INSTALL/$bin
            done

            # ── Stop old scraper service if still running ─────────────────
            sudo systemctl stop thg-scraper 2>/dev/null || true
            sudo systemctl disable thg-scraper 2>/dev/null || true

            # ── Install systemd services ──────────────────────────────────
            sudo cp $DEPLOY/deploy/thg-api.service    /etc/systemd/system/thg-api.service
            sudo cp $DEPLOY/deploy/thg-worker.service /etc/systemd/system/thg-worker.service
            sudo cp $DEPLOY/deploy/thg-frontend.service /etc/systemd/system/thg-frontend.service
            sudo systemctl daemon-reload
            sudo systemctl enable thg-api thg-worker thg-frontend

            # ── Install Node.js if not present ────────────────────────────
            if ! command -v node &>/dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            echo "Node: $(node --version), npm: $(npm --version)"

            # ── Deploy Next.js app ────────────────────────────────────────
            sudo rm -rf $INSTALL/frontend/.next
            sudo cp -r $DEPLOY/frontend/.next   $INSTALL/frontend/.next
            sudo cp -r $DEPLOY/frontend/public  $INSTALL/frontend/public 2>/dev/null || true
            sudo cp    $DEPLOY/frontend/package.json       $INSTALL/frontend/package.json
            sudo cp    $DEPLOY/frontend/package-lock.json  $INSTALL/frontend/package-lock.json
            sudo cp    $DEPLOY/frontend/next.config.mjs    $INSTALL/frontend/next.config.mjs
            sudo chown -R thg-scraper:thg-scraper $INSTALL/frontend

            # Install production node_modules (only if package.json changed)
            cd $INSTALL/frontend
            sudo -u thg-scraper npm ci --omit=dev --prefer-offline || \
              sudo -u thg-scraper npm install --omit=dev
            cd -

            # ── Update nginx ──────────────────────────────────────────────
            sudo cp $DEPLOY/deploy/nginx.conf /etc/nginx/sites-available/thg-scraper
            sudo ln -sf /etc/nginx/sites-available/thg-scraper /etc/nginx/sites-enabled/thg-scraper
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ nginx reloaded"

            # ── Restart services ──────────────────────────────────────────
            sudo systemctl restart thg-api thg-worker thg-frontend

            rm -rf $DEPLOY

            # ── Health checks ─────────────────────────────────────────────
            echo "Waiting for thg-api..."
            for i in $(seq 1 15); do
              sleep 2
              if curl -sf http://localhost:8080/health > /dev/null; then
                echo "✅ thg-api healthy (attempt $i)"
                break
              fi
              if [ $i -eq 15 ]; then
                echo "❌ thg-api health check failed — rolling back!"
                for bin in thg-api thg-worker; do
                  if [ -f $INSTALL/${bin}.prev ]; then
                    sudo mv $INSTALL/${bin}.prev $INSTALL/$bin
                    sudo chown root:thg-scraper $INSTALL/$bin
                    sudo chmod 750 $INSTALL/$bin
                  fi
                done
                sudo systemctl restart thg-api thg-worker
                sudo journalctl -u thg-api --no-pager -n 30
                exit 1
              fi
              echo "⏳ ($i/15)"
            done

            echo "Waiting for thg-frontend..."
            for i in $(seq 1 10); do
              sleep 2
              if curl -sf http://localhost:3000 > /dev/null; then
                echo "✅ thg-frontend healthy (attempt $i)"
                break
              fi
              echo "⏳ ($i/10)"
            done

            echo ""
            echo "🚀 Deploy complete!"
            echo "   API:      http://localhost:8080"
            echo "   Frontend: http://localhost:3000"
            echo "   Public:   https://sale.thgfulfill.com"
