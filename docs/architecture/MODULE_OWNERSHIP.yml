# Module Ownership Manifest
#
# Machine-readable companion to MODULE_BOUNDARIES.md. One entry per logical module.
# `status` is the honest current state, NOT an aspiration:
#   documented          - boundary written down (docs) only
#   scaffolded          - a doc.go package marker exists at the target path (Phase A)
#   partially_migrated  - some runtime code at the target path, some still elsewhere
#   enforced            - boundary is checked fail-hard in CI
#
# Phase A scaffolds the target roots + ownership. The architecture foundation
# sprint then performed the first SAFE move (Phase B persona) + additive ports/events
# scaffolds; Phase B.2 (copilot driver) and Phase C (FB runtime) were deferred with
# documented blockers. See REFACTOR_ROADMAP.md for phases + the sprint log.

version: 1
generated_for_commit_base: d35cf919   # Phase A merge
phase: "A done; foundation sprint: B(partial)+D+E done, B.2+C deferred"

modules:
