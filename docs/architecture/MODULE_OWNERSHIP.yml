    current_paths: [internal/platform/services, internal/workspace, internal/store]  # users/org at top-level store
    target_paths: [internal/platform]
    responsibility: >-
      Neutral multi-service shell: service registry, workspace/org tenancy root,
      composition of the service list. Hosts services; never knows their internals.
    allowed_dependency_direction: "platform -> {models, store(users/org), service contracts}"
    forbidden_imports: [services/*, ai(intelligence), jobhandlers, leadingest, drivers/*]
    status: scaffolded
    next_phase: "B/C (extract org/workspace shell; registry stays)"

