version: '3.8'

services:
  agent-brain:
    build:
      context: ./services/agent-brain
    image: thg-agent-brain:latest
    container_name: thg-agent-brain
    restart: unless-stopped
    environment:
      AGENT_BRAIN_PORT: 8091
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENT_BRAIN_PLANNER_MODEL: ${AGENT_BRAIN_PLANNER_MODEL:-gpt-4o-mini}
      AGENT_BRAIN_PLANNER_TIMEOUT_S: ${AGENT_BRAIN_PLANNER_TIMEOUT_S:-5}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/healthz', timeout=2).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  app:
    build:
      context: .
      platforms:
        - linux/arm64   # Oracle Cloud Always Free (Ampere A1)
    image: thg-scraper:latest
    container_name: thg-scraper
    restart: unless-stopped

    # Secrets come from .env — NEVER baked into the image
    env_file: .env
    environment:
      AGENT_BRAIN_URL: ${AGENT_BRAIN_URL:-http://agent-brain:8091}
      AGENT_BRAIN_TIMEOUT_MS: ${AGENT_BRAIN_TIMEOUT_MS:-1500}
    depends_on:
      agent-brain:
        condition: service_healthy

    ports:
      # Only bind to localhost — Nginx handles public traffic
      - "127.0.0.1:8080:8080"

    volumes:
      # Persist SQLite DB, Chrome profiles, and backups across restarts
      - scraper-data:/app/data

    # Resource limits (Oracle Always Free: 4 vCPU, 24 GB RAM)
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2'

    # Chromium requires these to run in a container
    security_opt:
      - seccomp:unconfined
    shm_size: '512mb'

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/stats"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Optional: Nginx reverse proxy (for Docker-based deployment)
  # For bare-metal deployment, use deploy/nginx.conf directly
  nginx:
    image: nginx:alpine
    container_name: thg-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/sites-available/thg-scraper:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    profiles:
      - with-nginx   # Start with: docker compose --profile with-nginx up

volumes:
  scraper-data:
    driver: local
